name: Publish

on:
  push:
    tags: ['v*.*.*']

permissions:
  contents: write
  packages: write
  id-token: write
  attestations: write

jobs:
  publish:
    uses: homelabforge/shared-workflows/.github/workflows/python-react-publish.yml@v1.0.0
    with:
      enable-e2e: false
      security-tripwire-script: .github/scripts/security-tripwire.sh
      image-name: homelabforge/familycircle
      release-name-prefix: 'FamilyCircle v'
    secrets:
      github-token: ${{ secrets.GITHUB_TOKEN }}
