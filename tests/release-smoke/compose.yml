# End-to-end test stack for FamilyCircle.
# FamilyCircle is SQLite-only and does not need Docker access. Single
# SQLite-backed instance from a freshly built image.
#
# Image tag is parameterized: run.sh builds and tests `familycircle:release-smoke`
# by default. Ad-hoc invocations can override with `FAMILYCIRCLE_E2E_IMAGE=...` to
# test a pre-built image (e.g. a GHCR pull during a soak), but the default
# MUST match the tag `run.sh` builds — otherwise the gate silently exercises
# a stale image and lets bad releases through (see mygarage v2.27.1 fixup).

services:
  app:
    image: ${FAMILYCIRCLE_E2E_IMAGE:-familycircle:release-smoke}
    container_name: familycircle-release-smoke-app
    environment:
      # FamilyCircle's startup validator hard-exits without PUBLIC_BASE_URL.
      # DEBUG=true bypasses the check so we can use request-derived URLs.
      DEBUG: "true"
    volumes:
      - app-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/health"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 30s

  smoke:
    image: python:3.14-slim
    container_name: familycircle-release-smoke-smoke
    depends_on:
      app:
        condition: service_healthy
    volumes:
      - ./smoke.py:/smoke.py:ro
    entrypoint: ["sh", "-c", "pip install -q httpx && python /smoke.py \"$$@\"", "--"]

volumes:
  app-data:
